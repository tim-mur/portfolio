<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нейротонин — Кейс</title>
  <link rel="stylesheet" href="/src/css/cursor.css">
  <link rel="stylesheet" href="/src/css/neyrotonin.css">
</head>
<body>

<div class="page-content">

  <!-- ══════════ SCREEN 1 — HERO ══════════ -->
  <section class="hero" id="screen-1">
    <div class="glitch-wrap" id="glitch-wrap">
      <div class="glitch-layer cyan"    id="layer-cyan">НЕЙРОТОНИН</div>
      <div class="glitch-layer magenta" id="layer-magenta">НЕЙРОТОНИН</div>
      <h1 class="glitch-title" id="glitch-title">НЕЙРОТОНИН</h1>
    </div>
  </section>

  <!-- ══════════ SCREEN 2 — О ПРОЕКТЕ ══════════ -->
  <section class="about-screen" id="screen-2">
    <div class="about-label" id="about-label" data-ru="О&nbsp;проекте" data-en="About">О&nbsp;проекте</div>

    <div class="about-texts">
      <p id="p1"></p>
      <p id="p2"></p>
    </div>

    <div class="about-cta">
      <a class="cta-btn" id="cta-btn" href="#"
         data-text="[ СВЯЗАТЬСЯ ]"
         data-ru="[ СВЯЗАТЬСЯ ]"
         data-en="[ CONTACT ]">[ СВЯЗАТЬСЯ ]</a>
    </div>

    <div class="about-mockup">
      <img class="lb-trigger" src="/src/assets/images/neyrotonin_9.jpg" alt="">
    </div>
  </section>

  <!-- ══════════ GALLERY ══════════ -->
  <section class="gallery-section">
    <div class="gallery">

      <!-- row 1 -->
      <div class="gi gi-1">
        <img class="lb-trigger" src="/src/assets/images/neyrotonin_1.jpg" alt="">
      </div>
      <div class="gi gi-sq1">
        <img class="lb-trigger" src="/src/assets/images/neyrotonin_bag.png" alt="">
      </div>

      <!-- row 2 -->
      <div class="gt gt-1"><p id="gt1-text"></p></div>
      <div class="gi gi-3">
        <img class="lb-trigger" src="/src/assets/images/neyrotonin_6.jpg" alt="">
      </div>

      <!-- row 3 -->
      <div class="gi gi-sq2">
        <img class="lb-trigger" src="/src/assets/images/neyrotonin_4.png" alt="">
      </div>
      <div class="gi gi-4">
        <img class="lb-trigger" src="/src/assets/images/neyrotonin_10.jpg" alt="">
      </div>

      <!-- row 4 -->
      <div class="gi gi-5">
        <img class="lb-trigger" src="/src/assets/images/neyrotonin_wallpaper.jpg" alt="">
      </div>
      <div class="gi gi-mid">
        <img class="lb-trigger" src="/src/assets/images/neyrotonin_7.jpg" alt="">
      </div>
      <div class="gt gt-2"><p id="gt2-text"></p></div>

      <!-- row 5 -->
      <div class="gi gi-6">
        <img class="lb-trigger" src="/src/assets/images/neyrotonin_all.jpg" alt="">
      </div>
      <div class="gi-7-wrap">
        <img class="lb-trigger" src="/src/assets/images/neyrotonin_logo.png" alt="">
        <p id="gt3-text"></p>
      </div>

      <!-- row 6: full-width -->
      <div class="gi gi-8">
        <img class="lb-trigger" src="/src/assets/images/neyrotonin_8.jpg" alt="">
      </div>

    </div>
  </section>

</div><!-- /.page-content -->

<div class="footer-space" id="footer-space"></div>

<!-- ══════════ FOOTER ══════════ -->
<footer class="footer" id="footer">
  <div class="footer__inner" id="footer-inner">
    <p class="footer__quote"
       data-ru="&ldquo;Мои соцсети созданы исключительно для креативных людей, идей и самовыражения.&rdquo;"
       data-en="&ldquo;My social media exists exclusively for creative people, ideas and self-expression.&rdquo;">
      &ldquo;Мои соцсети созданы исключительно для<br>креативных людей, идей и самовыражения.&rdquo;
    </p>
    <div class="footer__social" id="footer-social">
      <a class="footer__icon" href="#" title="Telegram">
        <img src="/src/assets/images/telegram.svg" alt="Telegram">
      </a>
      <div class="footer__line"></div>
      <a class="footer__icon" href="#" title="Threads">
        <img src="/src/assets/images/threads.svg" alt="Threads">
      </a>
      <div class="footer__line"></div>
      <a class="footer__icon" href="#" title="Instagram">
        <img src="/src/assets/images/instagram.svg" alt="Instagram">
      </a>
    </div>
  </div>
</footer>

<!-- ══════════ BACK BUTTON ══════════ -->
<a class="back-btn" href="designer.html" id="back-btn"
   data-ru="назад к списку кейсов"
   data-en="back to case list">
  назад к списку кейсов
  <img class="px-arrow" src="/src/assets/images/pixel_arrow.svg" alt="">
</a>

<script type="module" src="/src/js/neyrotonin.js"></script>

</body>
</html>
