<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Эрмитаж — Кейс</title>
  <link rel="stylesheet" href="/src/css/cursor.css">
  <link rel="stylesheet" href="/src/css/cases/ermitazh.css">
  <!-- Preload картинок брендинга, чтобы они были готовы к моменту прокрутки -->
  <link rel="preload" as="image" href="/src/assets/images/hermitage/merch-1.png">
  <link rel="preload" as="image" href="/src/assets/images/hermitage/merch-2.png">
  <link rel="preload" as="image" href="/src/assets/images/hermitage/merch-3.png">
  <link rel="preload" as="image" href="/src/assets/images/hermitage/merch-4.png">
  <link rel="preload" as="image" href="/src/assets/images/hermitage/merch-5.png">
  <link rel="preload" as="image" href="/src/assets/images/hermitage/merch-6.png">
  <link rel="preload" as="image" href="/src/assets/images/hermitage/hermitage_logo.png">
</head>
<body>

<div class="page-content">

  <!-- ══════════ SCREEN 1 — HERO ══════════ -->
  <section class="hero" id="screen-1">
    <div class="glitch-wrap" id="glitch-wrap">
      <div class="glitch-layer cyan"    id="layer-cyan"    data-ru="ЭРМИТАЖ" data-en="HERMITAGE">ЭРМИТАЖ</div>
      <div class="glitch-layer magenta" id="layer-magenta" data-ru="ЭРМИТАЖ" data-en="HERMITAGE">ЭРМИТАЖ</div>
      <h1 class="glitch-title" id="glitch-title"           data-ru="ЭРМИТАЖ" data-en="HERMITAGE">ЭРМИТАЖ</h1>
    </div>
  </section>

  <!-- ══════════ SCREEN 2 — О ПРОЕКТЕ ══════════ -->
  <section class="about-screen" id="screen-about">
    <div class="about-label s-label" data-ru="О&nbsp;проекте" data-en="About">О&nbsp;проекте</div>

    <div class="about-texts">
      <p id="about-p1"></p>
      <p id="about-p2"></p>
    </div>

    <div class="about-cta">
      <a class="cta-btn" id="about-cta-btn" href="#"
         data-text="[ СВЯЗАТЬСЯ ]"
         data-ru="[ СВЯЗАТЬСЯ ]"
         data-en="[ CONTACT ]">[ СВЯЗАТЬСЯ ]</a>
    </div>

    <div class="about-mockup">
      <img src="/src/assets/images/hermitage/hermitage_logo.png" alt="Hermitage logo">
    </div>
  </section>

  <!-- ══════════ SCREEN 3 — АНАЛИЗ КОНКУРЕНТОВ (2 колонки) ══════════ -->
  <section class="split-screen" id="screen-analysis">
    <h2 class="split-label s-label" data-ru="Анализ&nbsp;конкурентов" data-en="Competitor&nbsp;analysis">Анализ&nbsp;конкурентов</h2>
    <div class="split-text">
      <p id="analysis-p1"></p>
    </div>
  </section>

  <!-- ══════════ COMBINED: User flow + UI + три видео ══════════ -->
  <section class="flow-ui-section" id="screen-flow-ui">
    <div class="flow-ui-grid">
      <div class="flow-ui-col">
        <h2 class="flow-ui-label s-label" data-ru="Проработка&nbsp;сценария" data-en="User flow">Проработка&nbsp;сценария</h2>
        <p id="scenario-text" class="flow-ui-text"></p>
      </div>
      <div class="flow-ui-col">
        <h2 class="flow-ui-label s-label" data-ru="UI" data-en="UI">UI</h2>
        <p id="ui-p1" class="flow-ui-text"></p>
      </div>
    </div>

    <div class="flow-ui-video-block">
      <p class="flow-ui-caption"
         data-ru="Главная страница"
         data-en="Home page">Главная страница</p>
      <div class="flow-ui-video" data-cursor="media" data-cursor-label="СМОТРЕТЬ">
        <video src="/src/assets/video/hermitage_website.mp4" autoplay loop muted playsinline></video>
      </div>
    </div>

    <div class="flow-ui-video-block">
      <p class="flow-ui-caption"
         data-ru="Выставки и события"
         data-en="Exhibitions and events">Выставки и события</p>
      <div class="flow-ui-video" data-cursor="media" data-cursor-label="СМОТРЕТЬ">
        <video src="/src/assets/video/hermitage_website_2.mp4" autoplay loop muted playsinline></video>
      </div>
    </div>

    <div class="flow-ui-video-block">
      <p class="flow-ui-caption"
         data-ru="Выбранная выставка"
         data-en="Selected exhibition">Выбранная выставка</p>
      <div class="flow-ui-video" data-cursor="media" data-cursor-label="СМОТРЕТЬ">
        <video src="/src/assets/video/hermitage_website_3.mp4" autoplay loop muted playsinline></video>
      </div>
    </div>
  </section>

  <!-- ══════════ GALLERY GROUP 2: Брендинг и мерч (6 картинок) ══════════ -->
  <section class="gallery-section group-branding">
    <div class="group-label s-label" data-ru="Брендинг&nbsp;и&nbsp;мерч" data-en="Branding&nbsp;&amp;&nbsp;merch">Брендинг&nbsp;и&nbsp;мерч</div>
    <div class="gallery gallery-brand">
      <div class="gi gi-b1"><img src="/src/assets/images/hermitage/merch-1.png" alt="" loading="eager" decoding="sync" fetchpriority="high"></div>
      <div class="gi gi-b2"><img src="/src/assets/images/hermitage/merch-2.png" alt="" loading="eager" decoding="sync" fetchpriority="high"></div>
      <div class="gi gi-b3"><img src="/src/assets/images/hermitage/merch-3.png" alt="" loading="eager" decoding="sync" fetchpriority="high"></div>
      <div class="gi gi-b4"><img src="/src/assets/images/hermitage/merch-4.png" alt="" loading="eager" decoding="sync" fetchpriority="high"></div>
      <div class="gi gi-b5"><img src="/src/assets/images/hermitage/merch-5.png" alt="" loading="eager" decoding="sync" fetchpriority="high"></div>
      <div class="gi gi-b6"><img src="/src/assets/images/hermitage/merch-6.png" alt="" loading="eager" decoding="sync" fetchpriority="high"></div>
    </div>
  </section>

  <!-- ══════════ SCREEN: Метрики + Результат (объединены) ══════════ -->
  <section class="combined-screen" id="screen-metrics-result">
    <div class="combined-row">
      <h2 class="split-label s-label" data-ru="Метрики&nbsp;успеха" data-en="Metrics">Метрики&nbsp;успеха</h2>
      <div class="split-text">
        <p id="metrics-text"></p>
      </div>
    </div>
    <div class="combined-row">
      <h2 class="split-label s-label" data-ru="Результат" data-en="Result">Результат</h2>
      <div class="split-text">
        <p id="result-text"></p>
      </div>
    </div>
  </section>

</div><!-- /.page-content -->

<div class="footer-space" id="footer-space"></div>

<!-- ══════════ FOOTER ══════════ -->
<footer class="footer" id="footer">
  <div class="footer__inner" id="footer-inner">
    <p class="footer__quote"
       data-ru="&ldquo;ДИЗАЙН ДИЗАЙНОМ, ЗАТО Я ЧЕЛОВЕК ХОРОШИЙ&rdquo;"
       data-en="&ldquo;DESIGN IS DESIGN, BUT I&rsquo;M A GOOD PERSON&rdquo;">
      &ldquo;ДИЗАЙН ДИЗАЙНОМ,<br>ЗАТО Я ЧЕЛОВЕК ХОРОШИЙ&rdquo;
    </p>
    <div class="footer__social" id="footer-social">
      <a class="footer__icon" href="#" title="Telegram">
        <img src="/src/assets/icons/telegram.svg" alt="Telegram">
      </a>
      <div class="footer__line"></div>
      <a class="footer__icon" href="#" title="Threads">
        <img src="/src/assets/icons/threads.svg" alt="Threads">
      </a>
      <div class="footer__line"></div>
      <a class="footer__icon" href="#" title="Instagram">
        <img src="/src/assets/icons/instagram.svg" alt="Instagram">
      </a>
    </div>
  </div>
</footer>

<!-- ══════════ BACK BUTTON ══════════ -->
<a class="back-btn" href="/designer/index.html" id="back-btn"
   data-ru="назад к списку кейсов"
   data-en="back to case list">
  назад к списку кейсов
  <svg class="px-arrow" width="24" height="21" viewBox="0 0 24 21" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 9V12L24 12V9L0 9ZM18 12V15H21V12H18ZM15 15V18H18V15H15ZM12 18L12 21H15L15 18H12ZM18 9V6H21V9H18Z" fill="currentColor"/>
    <path d="M15 15V3H18V15H15ZM12 18V0L15 0V18H12Z" fill="currentColor"/>
  </svg>
</a>

<script type="module" src="/src/js/cases/ermitazh.js"></script>

</body>
</html>
