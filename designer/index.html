<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Designer</title>
  <base href="/portfolio/">
  <link rel="stylesheet" href="src/css/base.css">
  <link rel="stylesheet" href="src/css/cursor.css">
  <link rel="stylesheet" href="src/css/cases/phrase.css">
  <link rel="stylesheet" href="src/css/cases/designer.css">
  <link rel="stylesheet" href="src/css/cases/designer-responsive.css">
</head>
<body>

  <section class="slide" id="phrase-screen">
    <div class="mode-switcher" id="mode-switcher">
      <span class="mode-btn" id="mode-designer"></span>
      <div class="mode-line" id="mode-line-left">
        <div class="line-inner">
          <div class="line-track"></div>
          <div class="line-sweep" id="sweep-left"></div>
        </div>
      </div>
      <div class="mode-line" id="mode-line-right">
        <div class="line-inner">
          <div class="line-track"></div>
          <div class="line-sweep" id="sweep-right"></div>
        </div>
      </div>
      <span class="mode-btn" id="mode-photographer" data-ru="ФОТОГРАФ" data-en="PHOTOGRAPHER"></span>
    </div>

    <div class="hero">
      <h1 class="hero-phrase" id="hero-phrase">
        </h1>
    </div>
  </section>

  <section class="slide case-card" style="--bg:#00A0A0; --tx:#F7F9FC;">
    <div class="case-inner">
      <div class="case-left">
        <div class="case-top">
          <h2 class="case-title" data-ru="ЭРМИТАЖ" data-en="HERMITAGE"></h2>
          <div class="case-cats">
            <span class="case-cat">UX/UI</span>
            <div class="case-sep"></div>
            <span class="case-cat">Research</span>
          </div>
          <p class="case-desc" 
             data-ru="Редизайн мобильного приложения Государственного Эрмитажа. Основной упор был сделан на упрощение навигации и создание удобного интерфейса для покупки билетов и планирования визитов."
             data-en="Redesign of the State Hermitage Museum mobile app. Focused on streamlining navigation and creating a convenient interface for ticket purchases and visit planning."></p>
        </div>
        <div class="case-bottom desktop-only">
          <a href="designer/cases/ermitazh.html" class="case-cta-link">
            <span class="case-cta" data-ru="[ ПОСМОТРЕТЬ КЕЙС ]" data-en="[ VIEW CASE ]"></span>
          </a>
        </div>
      </div>
      <div class="case-media-wrap">
        <a href="designer/cases/ermitazh.html" class="case-media-link">
          <video class="case-media" src="src/assets/video/hermitage_main.mp4" autoplay loop muted playsinline></video>
        </a>
      </div>
    </div>
  </section>

  <section class="slide case-card" style="--bg:#1A1A1A; --tx:#FFFFFF;">
    <div class="case-inner">
      <div class="case-left">
        <div class="case-top">
          <h2 class="case-title" data-ru="ПРОФИМАТИКА" data-en="PROFIMATIKA"></h2>
          <div class="case-cats">
            <span class="case-cat">UX/UI</span>
            <div class="case-sep"></div>
            <span class="case-cat">Design System</span>
          </div>
          <p class="case-desc" 
             data-ru="Проектирование личного кабинета и дашбордов статистики для онлайн-школы. На основе опроса 284 респондентов была разработана гибкая дизайн-система."
             data-en="Designing a personal dashboard and analytics for an online school. Based on a survey of 284 respondents, a flexible design system was developed."></p>
        </div>
        <div class="case-bottom desktop-only">
          <a href="designer/cases/profimatika.html" class="case-cta-link">
            <span class="case-cta" data-ru="[ ПОСМОТРЕТЬ КЕЙС ]" data-en="[ VIEW CASE ]"></span>
          </a>
        </div>
      </div>
      <div class="case-media-wrap">
        <a href="designer/cases/profimatika.html" class="case-media-link">
          <video class="case-media" src="src/assets/video/profimatika_main.mp4" autoplay loop muted playsinline></video>
        </a>
      </div>
    </div>
  </section>

  <section class="slide case-card" style="--bg:#E50136; --tx:#FFFFFF;">
    <div class="case-inner">
      <div class="case-left">
        <div class="case-top">
          <h2 class="case-title" data-ru="ЯНДЕКС.КРАУД" data-en="YANDEX.CROWD"></h2>
          <div class="case-cats">
            <span class="case-cat">Motion</span>
            <div class="case-sep"></div>
            <span class="case-cat">Landing Page</span>
          </div>
          <p class="case-desc" 
             data-ru="Дизайн лендинга платформы управления рекламой. Современная подача через моушн-формат и четкую визуальную иерархию для медиа-издателей."
             data-en="Landing page design for an ad management platform. Modern presentation through motion format and clear visual hierarchy for media publishers."></p>
        </div>
        <div class="case-bottom desktop-only">
          <a href="designer/cases/yandex-crowd.html" class="case-cta-link">
            <span class="case-cta" data-ru="[ ПОСМОТРЕТЬ КЕЙС ]" data-en="[ VIEW CASE ]"></span>
          </a>
        </div>
      </div>
      <div class="case-media-wrap">
        <a href="designer/cases/yandex-crowd.html" class="case-media-link">
          <video class="case-media" src="src/assets/video/yandex-crowd_main.mp4" autoplay loop muted playsinline></video>
        </a>
      </div>
    </div>
  </section>

  <div class="ui-overlay">
    <div class="lang-switcher-fixed">
      <span class="lang-btn-fixed" id="lang-ru-fixed">[ RU ]</span>
      <div class="lang-line-fixed">
        <div class="line-track-fixed"></div>
      </div>
      <span class="lang-btn-fixed" id="lang-en-fixed">[ EN ]</span>
    </div>
  </div>

  <script src="src/js/cursor.js"></script>
  <script src="src/js/cases/phrase.js"></script>
  <script src="src/js/cases/designer-list.js"></script>
</body>
</html>
