<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Designer</title>
  <link rel="stylesheet" href="/portfolio/src/css/base.css">
  <link rel="stylesheet" href="/portfolio/src/css/cursor.css">
  <link rel="stylesheet" href="/portfolio/src/css/cases/phrase.css">
  <link rel="stylesheet" href="/portfolio/src/css/cases/designer.css">
  <link rel="stylesheet" href="/portfolio/src/css/cases/designer-responsive.css">
</head>
<body>

  <section class="slide" id="phrase-screen">
    <div class="mode-switcher" id="mode-switcher">
      <span class="mode-btn" id="mode-designer"></span>
      <div class="mode-line" id="mode-line-left">
        <div class="line-inner">
          <div class="line-track"></div>
          <div class="line-sweep" id="sweep-left"></div>
        </div>
      </div>
      <div class="mode-line" id="mode-line-right">
        <div class="line-inner">
          <div class="line-track"></div>
          <div class="line-sweep" id="sweep-right"></div>
        </div>
      </div>
      <span class="mode-btn" id="mode-photographer"></span>
    </div>
    <div class="hero" id="hero">
      <span class="hero-base" id="hero-base"></span>
      <span class="hero-green" id="hero-green"></span>
    </div>
  </section>

  <section class="slide case-card" style="--bg:#00A0A0;--tx:#F7F9FC;">
    <div class="case-inner">
      <div class="case-left">
        <div class="case-top">
          <h2 class="case-title" data-ru="ЭРМИТАЖ" data-en="HERMITAGE"></h2>
          <div class="case-cats">
            <span class="case-cat" data-ru="[ Брендинг ]"  data-en="[ Branding ]"></span>
            <span class="case-sep"></span>
            <span class="case-cat" data-ru="[ Веб ]"        data-en="[ Web ]"></span>
            <span class="case-sep"></span>
            <span class="case-cat" data-ru="[ Соцсети ]"    data-en="[ Social media ]"></span>
          </div>
          <p class="case-desc"
             data-ru="Создал новый масштабируемый логотип в версиях для устройств разных размеров. Разработал дизайн мерча, чтобы стиль музея выглядел цельно и запоминался. Я переработал сценарий покупки билетов, чтобы людям было проще попасть в музей: обновил главную страницу, уменьшил количество шагов до покупки, сделал понятный UI."
             data-en="Created a new scalable logo in versions for different screen sizes. Designed merch so the museum's visual style felt cohesive and memorable. Redesigned the ticket purchasing flow — updated the homepage, reduced steps to checkout, and built a clear UI."></p>
        </div>
        <div class="case-bottom desktop-only">
          <a href="/portfolio/designer/cases/ermitazh.html" class="case-cta-link">
             <span class="case-cta" data-ru="[ ПОСМОТРЕТЬ КЕЙС ]" data-en="[ VIEW CASE ]"></span>
          </a>
        </div>
      </div>
      <div class="case-media-wrap">
        <a href="/portfolio/designer/cases/ermitazh.html" class="case-media-link">
          <video class="case-media" src="/portfolio/src/assets/video/hermitage_main.mp4" autoplay loop muted playsinline></video>
        </a>
      </div>
    </div>
  </section>

  <section class="slide case-card" style="--bg:#3A80FC;--tx:#FFF4B2;">
    <div class="case-inner">
      <div class="case-left">
        <div class="case-top">
          <h2 class="case-title" data-ru="ПРОФИМАТИКА" data-en="PROFIMATIKA"></h2>
          <div class="case-cats">
            <span class="case-cat" data-ru="[ UX/UI ]"        data-en="[ UX/UI ]"></span>
            <span class="case-sep"></span>
            <span class="case-cat" data-ru="[ Исследования ]" data-en="[ Research ]"></span>
          </div>
          <p class="case-desc"
             data-ru="Разработал дизайн веб-платформы для школьников, студентов и учителей, которая помогает им общаться и решать задачи в одном месте без лишних посредников и потери информации. Проект создавался на основе исследований пользователей, чтобы учесть их реальные потребности и упростить учебные процессы. Создал дизайн-систему с нуля и разработал макеты для каждого сценария."
             data-en="Designed a web platform for schoolchildren, students and teachers to communicate and complete tasks in one place. Built on user research to address real needs and simplify educational workflows. Created the design system from scratch and produced layouts for every use case."></p>
        </div>
        <div class="case-bottom desktop-only">
          <a href="/portfolio/designer/cases/profimatika.html" class="case-cta-link">
             <span class="case-cta" data-ru="[ ПОСМОТРЕТЬ КЕЙС ]" data-en="[ VIEW CASE ]"></span>
          </a>
        </div>
      </div>
      <div class="case-media-wrap">
        <a href="/portfolio/designer/cases/profimatika.html" class="case-media-link">
          <img class="case-media" src="/portfolio/src/assets/images/projects/profimatika.png" alt="">
        </a>
      </div>
    </div>
  </section>

  <section class="slide case-card" style="--bg:#4A64F6;--tx:#F7F9FC;">
    <div class="case-inner">
      <div class="case-left">
        <div class="case-top">
          <h2 class="case-title" data-ru="ЯНДЕКС КРАУД" data-en="YANDEX CROWD"></h2>
          <div class="case-cats">
            <span class="case-cat" data-ru="[ Веб ]"     data-en="[ Web ]"></span>
            <span class="case-sep"></span>
            <span class="case-cat" data-ru="[ Моушен ]"  data-en="[ Motion ]"></span>
          </div>
          <p class="case-desc"
             data-ru="Разработал лендинг для платформы управления интернет-рекламой для медиа-издателей. Я продумал общий стиль сайта и сделал его понятным и современным. Перед началом работы я провёл исследование, чтобы лучше понять желания пользователей. На основе этого я создал UI KIT. Также сделал адаптивные версии. В этом проекте моя ценность как дизайнера была в том, что я собрал целостный и удобный продукт от идеи до готовых экранов."
             data-en="Designed a landing page for an online advertising management platform for media publishers. Defined the visual style to make it clear and modern, conducted user research, built a UI kit and created adaptive layouts. My value was assembling a coherent product from concept to final screens."></p>
        </div>
        <div class="case-bottom desktop-only">
          <a href="/portfolio/designer/cases/yandex-crowd.html" class="case-cta-link">
             <span class="case-cta" data-ru="[ ПОСМОТРЕТЬ КЕЙС ]" data-en="[ VIEW CASE ]"></span>
          </a>
        </div>
      </div>
      <div class="case-media-wrap">
        <a href="/portfolio/designer/cases/yandex-crowd.html" class="case-media-link">
          <video class="case-media" src="/portfolio/src/assets/video/yandex-crowd_main.mp4" autoplay loop muted playsinline></video>
        </a>
      </div>
    </div>
  </section>

  <div class="ui-overlay">
    <div class="lang-switcher-fixed">
      <span class="lang-btn-fixed" id="lang-ru-fixed" data-ru="[ RU ]" data-en="[ RU ]">[ RU ]</span>
      <div class="lang-line-fixed">
        <div class="line-track-fixed"></div>
      </div>
      <span class="lang-btn-fixed" id="lang-en-fixed" data-ru="[ EN ]" data-en="[ EN ]">[ EN ]</span>
    </div>
  </div>

  <script src="/portfolio/src/js/cursor.js"></script>
  <script src="/portfolio/src/js/cases/phrase.js"></script>
  <script src="/portfolio/src/js/lightbox.js"></script>
  <script src="/portfolio/src/js/designer-list.js"></script>
  <script src="/portfolio/src/js/cases/designer-responsive-patch.js"></script>

</body>
</html>
