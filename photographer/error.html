<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>302 — Project</title>
    <link rel="stylesheet" href="/src/css/cursor.css">
    <link rel="stylesheet" href="/src/css/error.css">

<body>

    <div class="mode-switcher" id="mode-switcher">
        <span class="mode-btn active" id="mode-designer">[ ДИЗАЙНЕР ]</span>
        <div class="mode-line">
            <div class="line-inner"><div class="line-track"></div></div>
        </div>
        <div class="mode-line">

        </div>
        <span class="mode-btn" id="mode-photographer">[ ФОТОГРАФ ]</span>

    <main class="hero">

            <div class="glitch-layer cyan">302</div>
            <div class="glitch-layer magenta">302</div>

        </div>

    <div class="bottom-container">
        <p class="bottom-phrase">ДИЗАЙН ДИЗАЙНОМ, ЗАТО Я ЧЕЛОВЕК ХОРОШИЙ</p>
        
        <div class="lang-switcher" id="lang-switcher">

            <div class="lang-line"><div class="line-inner"></div></div>
            <span class="lang-btn" id="lang-en">EN</span>
        </div>

  <script src="/src/js/cursor.js"></script>
